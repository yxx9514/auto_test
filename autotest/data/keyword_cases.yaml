 cases:
   - name: "API: 获取用户并断言字段"
     steps:
       - keyword: api_mock_get
         args:
           url: "https://api.local/users/1"
           status: 200
           json:
             id: 1
             name: "alice"
       - keyword: api_get
         args:
           url: "https://api.local/users/1"
         save_as: resp
       - keyword: assert_json_path
         args:
           data_ref: "${resp.json}"
           path: "name"
           expected: "alice"
 
